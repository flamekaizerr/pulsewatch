name: PulseWatch Scheduled Cron Checks

on:
  schedule:
    # Run every 15 minutes (free-tier friendly interval)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PulseWatch Uptime Engine Check
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/internal/run-checks" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail
